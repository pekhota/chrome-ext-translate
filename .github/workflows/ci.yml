name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Validate manifest.json
        run: npm run validate

      - name: Check src/ and pdfjs/web/ overlays are in sync
        run: |
          if ! diff -q src/translate-overlay.js pdfjs/web/translate-overlay.js > /dev/null; then
            echo "ERROR: src/translate-overlay.js and pdfjs/web/translate-overlay.js are out of sync."
            diff src/translate-overlay.js pdfjs/web/translate-overlay.js
            exit 1
          fi
          echo "OK: overlay files are in sync."

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan every commit

      - name: Gitleaks — scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
